name: Publish beta

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump: prerelease, preminor or premajor"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease
          - preminor
          - premajor

jobs:
  publish-beta:
    name: Publish beta to package registry
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Build package
        id: build
        uses: ./.github/actions/build-package
        with:
          publish_type: beta
          version_type: ${{ inputs.version_type }}

      - name: Publish beta package
        id: publish
        shell: bash
        run: npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version commit and tag
        if: steps.publish.outcome == 'success'
        shell: bash
        run: git push --follow-tags